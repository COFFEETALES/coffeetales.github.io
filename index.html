<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting to FPS.COFFEE</title>
    <meta http-equiv="refresh" content="0; url=//fps.coffee" />
    <style>
      html,
      body {
        margin: 0;
        background: #070d1c;
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1rem;
        color: #e7f3ff;
        font:
          16px/1.6 system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      main {
        box-sizing: border-box;
        width: min(100%, 28rem);
        padding: 1.5rem;
        border: 1px solid rgba(66, 245, 255, 0.18);
        background: #101d3b;
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.25rem;
        line-height: 1.3;
      }

      p {
        margin: 0;
        color: #9cb2d9;
      }

      a {
        color: #42f5ff;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Redirecting to https://FPS.COFFEE</h1>
      <p>
        If you are not redirected automatically, open
        <a href="https://fps.coffee">https://fps.coffee</a>.
      </p>
    </main>
  </body>
</html>

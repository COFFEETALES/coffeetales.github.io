<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Interactive playground for wasm2lang — transpile WebAssembly text format to asm.js, JavaScript (ES2020+), PHP, and Java."
    />
    <title>wasm2lang Playground</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230d1117'/><text x='16' y='23' font-family='Arial,Helvetica,sans-serif' font-size='19' font-weight='700' fill='%23e6edf3' text-anchor='middle'>W</text></svg>"
    />
    <link rel="stylesheet" href="wasm2lang_playground.css" />
  </head>
  <body>
    <dialog class="loading-overlay" id="loading-overlay">
      <div class="loading-overlay-body">
        <div class="loading-spinner"></div>
        <p class="loading-label">Loading…</p>
      </div>
    </dialog>
    <script>
      document.getElementById("loading-overlay").showModal();
    </script>

    <div class="page-shell">
      <div class="page-row">
        <div class="header">
          <div class="header-main">
            <div class="header-labels">
              <h1>wasm2lang <span class="subtitle">Playground</span></h1>
              <a
                class="github-link"
                href="https://github.com/COFFEETALES/wasm2lang"
                target="_blank"
              >
                <svg viewBox="0 0 16 16" fill="currentColor">
                  <path
                    d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.64 7.64 0 0 1 2-.27c.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"
                  />
                </svg>
                GitHub
              </a>
            </div>
            <div class="header-version">
              <a
                class="badge-link"
                href="https://www.npmjs.com/package/@coffeetales.net/wasm2lang"
                target="_blank"
              >
                <img
                  src="https://img.shields.io/npm/v/%40coffeetales.net%2Fwasm2lang.svg?style=flat&label=latest&color=007acc&logo=npm&logoColor=white"
                  alt="npm version"
                  height="22"
                />
              </a>
            </div>
          </div>
          <div class="badge-strip" aria-label="Project links">
            <a
              class="badge-link"
              href="https://github.com/COFFEETALES/wasm2lang/stargazers"
              target="_blank"
            >
              <img
                src="https://img.shields.io/github/stars/COFFEETALES/wasm2lang?style=flat&label=stars&color=f59e0b&logo=github&logoColor=white"
                alt="GitHub stars"
                height="22"
              />
            </a>
            <a class="fps-link" href="https://fps.coffee" target="_blank">
              fps.coffee
            </a>
          </div>
        </div>
      </div>
      <div class="page-row">
        <div class="controls">
          <div class="sample-picker-cell" id="sample-picker-shell">
            <span class="control-label">Sample</span>
            <button
              id="sample-picker-btn"
              class="sample-picker-btn"
              type="button"
              aria-haspopup="true"
              aria-controls="sample-picker"
              aria-expanded="false"
              disabled
            >
              <span id="sample-picker-current">Loading samples...</span>
              <span class="sample-picker-caret" aria-hidden="true">▾</span>
            </button>
            <div class="sample-picker-popover" id="sample-picker" hidden>
              <div class="sample-picker-head">
                <input
                  id="sample-search"
                  type="search"
                  placeholder="Search samples or tags"
                  spellcheck="false"
                />
              </div>
              <div class="sample-picker-list" id="sample-picker-list"></div>
              <p class="sample-picker-empty" id="sample-picker-empty" hidden>
                No samples match your search.
              </p>
            </div>
          </div>
          <label
            >Backend
            <select id="backend">
              <option value="asmjs">asm.js</option>
              <option value="javascript" selected>JavaScript</option>
              <option value="php64">PHP</option>
              <option value="java">Java</option>
            </select>
          </label>
          <label
            >Normalization
            <select id="normalize">
              <option value="binaryen:max,wasm2lang:codegen" selected>
                binaryen:max, wasm2lang:codegen
              </option>
              <option value="binaryen:max">binaryen:max</option>
              <option value="binaryen:min,wasm2lang:codegen">
                binaryen:min, wasm2lang:codegen
              </option>
              <option value="binaryen:min">binaryen:min</option>
              <option value="binaryen:none,wasm2lang:codegen">
                binaryen:none, wasm2lang:codegen
              </option>
              <option value="binaryen:none">binaryen:none</option>
            </select>
          </label>
          <label
            >Mangler
            <select id="mangler">
              <option value="">Off</option>
              <option value="random" selected>Random</option>
              <option value="demo">Fixed string: demo</option>
            </select>
          </label>
          <span class="btn-cell"
            ><button id="transpile-btn" disabled>Loading...</button></span
          >
        </div>
      </div>
      <div class="page-row">
        <div class="sample-preview" id="sample-preview">
          <span class="sample-preview-title" id="sample-preview-title"></span>
          <span
            class="sample-preview-summary"
            id="sample-preview-summary"
          ></span>
          <span class="sample-preview-badges" id="sample-preview-badges"></span>
        </div>
      </div>
      <div class="page-row page-row-editor">
        <div class="editor">
          <div class="editor-labels">
            <label class="pane-header"><span>WAT Input</span></label>
            <label class="pane-header"
              ><span>Output</span>
              <select id="output-tab">
                <option value="code" selected>Metadata + Code</option>
                <option value="wat">Normalized WAT</option>
              </select>
            </label>
          </div>
          <div class="editor-panes">
            <div class="editor-pane">
              <div class="code-editor">
                <textarea id="input" spellcheck="false"></textarea>
                <pre aria-hidden="true"><code id="input-hl"></code></pre>
              </div>
            </div>
            <div class="editor-pane">
              <div class="code-editor">
                <textarea id="output" readonly spellcheck="false"></textarea>
                <pre aria-hidden="true"><code id="output-hl"></code></pre>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="page-row">
        <div class="footer-bar">
          <span id="status"></span>
          <a
            class="footer-sponsor"
            href="https://github.com/sponsors/COFFEETALES"
            target="_blank"
          >
            <img
              src="https://img.shields.io/badge/Sponsor-GitHub%20Sponsors-db2777?style=flat&logo=githubsponsors&logoColor=white"
              alt="GitHub Sponsors"
              height="28"
            />
          </a>
          <span id="version"></span>
        </div>
      </div>
    </div>

    <object
      aria-hidden="true"
      data="wasm2lang_samples.xml"
      height="0"
      id="samples-xml"
      style="display: block"
      tabindex="-1"
      type="text/xml"
      width="0"
    ></object>
    <script src="wasm2lang_playground.js"></script>
  </body>
</html>

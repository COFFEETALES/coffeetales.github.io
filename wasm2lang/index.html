<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>wasm2lang Playground</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="playground.css" />
  </head>
  <body>
    <div class="header">
      <h1>wasm2lang <span class="subtitle">Playground</span></h1>
      <a
        class="github-link"
        href="https://github.com/COFFEETALES/wasm2lang"
        target="_blank"
        rel="noopener"
      >
        <svg height="18" width="18" viewBox="0 0 16 16" fill="currentColor">
          <path
            d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.64 7.64 0 0 1 2-.27c.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"
          />
        </svg>
        GitHub
      </a>
    </div>

    <div class="controls">
      <label
        >Sample
        <select id="sample">
          <option value="fibonacci" selected>Fibonacci</option>
          <option value="add">Add</option>
          <option value="factorial">Factorial</option>
          <option value="collatz">Collatz conjecture</option>
          <option value="gcd">GCD (recursive)</option>
          <option value="select">Select (min / max)</option>
          <option value="global_counter">Global counter</option>
          <option value="memory">Memory store / load</option>
          <option value="strlen">Strlen (data segment)</option>
          <option value="lookup_table">Lookup table (data segment)</option>
          <option value="bitwise">Bitwise ops</option>
          <option value="crc32">CRC32</option>
        </select>
      </label>
      <label
        >Backend
        <select id="backend">
          <option value="asmjs" selected>asm.js</option>
          <option value="php64">PHP</option>
          <option value="java">Java</option>
        </select>
      </label>
      <label
        >Normalization
        <select id="normalize">
          <option value="binaryen:min,wasm2lang:codegen" selected>
            binaryen:min, wasm2lang:codegen
          </option>
          <option value="binaryen:min">binaryen:min</option>
          <option value="binaryen:none,wasm2lang:codegen">
            binaryen:none, wasm2lang:codegen
          </option>
          <option value="binaryen:none">binaryen:none</option>
          <option value="binaryen:max,wasm2lang:codegen">
            binaryen:max, wasm2lang:codegen
          </option>
        </select>
      </label>
      <label
        >Mangler
        <select id="mangler">
          <option value="" selected>Off</option>
          <option value="demo">demo</option>
          <option value="playground">playground</option>
        </select>
      </label>
      <span class="btn-cell"
        ><button id="transpile-btn" disabled>Loading...</button></span
      >
    </div>

    <div class="editor">
      <label class="pane-header">WAT Input</label>
      <label class="pane-header"
        >Output
        <select id="output-tab">
          <option value="code" selected>Metadata + Code</option>
          <option value="wat">Normalized WAT</option>
        </select>
      </label>
      <div class="code-editor">
        <textarea id="input" spellcheck="false"></textarea>
        <pre aria-hidden="true"><code id="input-hl"></code></pre>
      </div>
      <div class="code-editor">
        <textarea id="output" readonly spellcheck="false"></textarea>
        <pre aria-hidden="true"><code id="output-hl"></code></pre>
      </div>
    </div>

    <div class="footer-bar">
      <span id="status"></span>
      <span id="version"></span>
    </div>

    <script src="playground.js"></script>
  </body>
</html>
